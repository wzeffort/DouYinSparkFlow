name: DouYin Spark Flow Schedule Run
on:
  workflow_dispatch: # 允许手动触发
  schedule: # 定时任务
    - cron: "0 1 * * *" # 每天 1:00 UTC（对应北京时间 9:00）

# 全局添加环境变量，强制使用 Node.js 24（双重保障）
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  run-main:
    timeout-minutes: 20
    runs-on: ubuntu-latest
    environment: user-data1
    steps:
    # 1. 升级 checkout 到支持 Node.js 24 的版本（v4.2.0+）
    - uses: actions/checkout@v4.2.0
    # 2. 升级 setup-python 到完全适配 Node.js 24 的 v5 版本
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
    # 测试抖音可访问性
    - name: Test Douyin Accessibility
      run: |
        curl -I https://creator.douyin.com/
    # 安装依赖
    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install -r requirements.txt
    # 确保浏览器安装
    - name: Ensure browsers are installed
      run: playwright install chromium --with-deps --only-shell
    # 运行抖音脚本
    - name: Run DouYin Spark Flow
      env:
        USER_DATA: ${{ secrets.USER_DATA }}
      run: python main.py --doTask
    # 3. 升级 upload-artifact 到支持 Node.js 24 的版本（v4.3.0+）
    - uses: actions/upload-artifact@v4.3.0
      if: ${{ !cancelled() }}
      with:
        name: run-logs
        path: logs/
